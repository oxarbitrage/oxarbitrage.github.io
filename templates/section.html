{% extends "base.html" %}

{% block title %}{{ section.title }} | {{ config.title }}{% endblock title %}

{% block content %}
<article>
  <h1>{{ section.title }}</h1>
  <ul class="post-list">
    {% for page in section.pages %}
    <li>
      <span class="post-date">{{ page.date | date(format="%Y-%m-%d") }}</span>
      <a href="{{ page.permalink }}">{{ page.title }}</a>
    </li>
    {% endfor %}
  </ul>
</article>
{% endblock content %}
